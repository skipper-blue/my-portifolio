<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome - Skipper's Portfolio</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    :root{
      --bg:#000;
      --accent:#00c8ff; /* navy-cyan accent */
      --muted:#8a98a6;
    }

    html,body{height:100%;margin:0;font-family:Orbitron,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{
      background: radial-gradient(1200px 600px at 85% 20%, #1b2b36 0%, #000 25%, #000 60%);
      color:#fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    /* main container keeps content to the right on wide screens */
    .stage{
      width:100%;
      max-width:1200px;
      display:flex;
      align-items:center;
      justify-content:center; /* changed to center alignment */
      box-sizing:border-box;
    }

    .profile-card{
      width:320px;
      background:transparent;
      text-align:center;
      padding:28px 20px;
      border-radius:12px;
      position:relative;
      color:var(--accent);
      filter:drop-shadow(0 8px 40px rgba(0,200,255,0.06));
    }

    /* Avatar / device icon */
    .avatar{
      width:88px;
      height:88px;
      border-radius:14px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(0,200,255,0.08), rgba(0,200,255,0.02));
      box-shadow: 0 0 36px rgba(0,200,255,0.12), inset 0 -6px 14px rgba(0,0,0,0.25);
      border:2px solid rgba(0,200,255,0.14);
      transition:transform .32s ease, box-shadow .32s ease;
    }
    .avatar i{
      font-size:34px;
      color:var(--accent);
      text-shadow:0 0 12px rgba(0,200,255,0.55);
    }
    .avatar:hover{ transform:translateY(-6px) scale(1.03); box-shadow: 0 8px 48px rgba(0,200,255,0.18); }

    h1.profile-title{
      margin:0 0 18px;
      font-size:20px;
      color:var(--accent);
      letter-spacing:2px;
      text-transform:uppercase;
      text-shadow:0 0 18px rgba(0,200,255,0.18);
    }

    .icons-row{
      display:flex;
      gap:20px;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
    }
    .icon-btn{
      display:inline-flex;
      width:44px;
      height:44px;
      align-items:center;
      justify-content:center;
      border-radius:8px;
      background:linear-gradient(180deg, rgba(0,200,255,0.03), rgba(0,200,255,0.01));
      color:var(--accent);
      border:1px solid rgba(0,200,255,0.08);
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
      transition:transform .18s ease, box-shadow .18s ease, background .18s;
      text-decoration:none;
    }
    .icon-btn i{ font-size:18px; }
    .icon-btn:hover{ transform:translateY(-5px) scale(1.06); box-shadow: 0 12px 34px rgba(0,200,255,0.12); background:linear-gradient(180deg, rgba(0,200,255,0.08), rgba(0,200,255,0.02)); }

    .meta{
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
      letter-spacing:0.6px;
      color:#54d1ff; /* light cyan for designed by line */
    }

    /* small caption under icons in muted tone */
    .sub{
      font-size:12px;
      color:rgba(84,209,255,0.9);
      margin-top:12px;
    }

    /* Add fade-out animation */
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-10px); }
    }

    .fade-out {
      animation: fadeOut 0.5s ease-out forwards;
    }

    /* Loading indicator */
    .loading {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .loading.visible {
      opacity: 1;
    }

    /* Welcome text additions */
    .welcome-text {
      position: absolute;
      top: -60px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.8s ease-out 0.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsiveness: center card on narrow screens and scale down */
    @media (max-width:700px){
      .stage{ justify-content:center; padding:6vh 4vw; }
      .profile-card{ width:min(86vw,380px); padding:20px; }
      .avatar{ width:72px; height:72px; }
      h1.profile-title{ font-size:18px; }
    }
  </style>

  <script>
    // Redirect after 5 seconds
    window.addEventListener('load', () => {
      const card = document.querySelector('.profile-card');
      const loading = document.querySelector('.loading');
      
      // Show loading text after 3 seconds
      setTimeout(() => {
        loading.classList.add('visible');
      }, 3000);

      // Fade out and redirect after 5 seconds
      setTimeout(() => {
        card.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = 'assets/pages/profile.html';
        }, 500);
      }, 10000);
    });
  </script>
</head>
<body>
  <div class="stage" role="main" aria-label="Profile stage">
    <aside class="profile-card" aria-labelledby="profile-title">
      <!-- Welcome message -->
      <div class="welcome-text" aria-live="polite">
        Welcome to my digital space
      </div>

      <!-- ...existing avatar div... -->
      
      <div class="avatar" aria-hidden="true" title="Profile icon">
        <i class="bi bi-laptop"></i>
      </div>

      <h1 id="profile-title" class="profile-title">Skipper-blue</h1>

      <div class="icons-row" role="navigation" aria-label="Profile links">
        <a class="icon-btn" href="https://github.com/skipper-blue" target="_blank" title="GitHub (opens in new tab)" rel="noopener">
          <i class="bi bi-github"></i>
        </a>
        <a class="icon-btn" href="#" title="Portfolio">
          <i class="bi bi-code-slash"></i>
        </a>
        <a class="icon-btn" href="#" title="About me">
          <i class="bi bi-person"></i>
        </a>
      </div>

      <div class="sub">Frontend Engineer · Cybersecurity Expert</div>
    </aside>

    <!-- Loading indicator -->
    <div class="loading" aria-live="polite">
      Redirecting to portfolio...
    </div>
  </div>
</body>
</html>
